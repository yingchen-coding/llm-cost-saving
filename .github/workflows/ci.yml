name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy broker
      - run: pytest -q
      - name: CLI smoke (entry point; no provider CLIs required)
        run: |
          work="$(mktemp -d)"; cd "$work"
          broker --version
          broker init
          broker route -t codegen
          broker route -t reasoning
          broker status
          broker trace
